<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="input-container">
        <input type="text" name="input" id="input" placeholder="0" disabled />
      </div>

      <button id="mc" class="calc-button special-buttons mc">MC</button>
      <button id="mr" class="calc-button special-buttons mr">MR</button>
      <button id="m-plus" class="calc-button special-buttons m-plus">M+</button>
      <button id="m-minus" class="calc-button special-buttons m-minus">
        M-
      </button>
      <button
        class="calc-button special-buttons sign-change"
        data-type="sign-change"
      >
        +/-
      </button>
      <button class="calc-button special-buttons percent" data-type="percent">
        %
      </button>
      <button
        class="calc-button orange-buttons division"
        data-type="operator"
        data-value="/"
      >
        /
      </button>

      <button id="x-squared" class="calc-button special-buttons x-squared">
        x&sup2;
      </button>
      <button id="x-cubed" class="calc-button special-buttons x-cubed">
        x&sup2;
      </button>
      <button
        id="x-to-the-power-of-y"
        class="calc-button special-buttons x-to-the-power-of-y"
      >
        x
        <sup>y</sup>
      </button>
      <button
        class="calc-button numbers seven"
        data-type="number"
        data-value="7"
      >
        7
      </button>
      <button
        class="calc-button numbers eight"
        data-type="number"
        data-value="8"
      >
        8
      </button>
      <button
        class="calc-button numbers nine"
        data-type="number"
        data-value="9"
      >
        9
      </button>
      <button
        class="calc-button orange-buttons multiply"
        data-type="operator"
        data-value="*"
      >
        *
      </button>

      <button id="functional" class="calc-button special-buttons functional">
        x!
      </button>
      <button
        id="1-divided-by-x"
        class="calc-button special-buttons one-divided-by-x"
      >
        1/x
      </button>
      <button
        id="ten-powered-by-x"
        class="calc-button special-buttons ten-powered-by-x"
      >
        10
        <sup>x</sup>
      </button>
      <button
        class="calc-button numbers four"
        data-type="number"
        data-value="4"
      >
        4
      </button>
      <button
        class="calc-button numbers five"
        data-type="number"
        data-value="5"
      >
        5
      </button>
      <button class="calc-button numbers six" data-type="number" data-value="6">
        6
      </button>
      <button
        class="calc-button orange-buttons substract"
        data-type="operator"
        data-value="-"
      >
        -
      </button>

      <button
        id="square-root-from-x"
        class="calc-button special-buttons square-root-from-x"
      >
        &Sqrt;x
      </button>
      <button
        id="cube-root-from-x"
        class="calc-button special-buttons cube-root-from-x"
      >
        <sup>3</sup>
        &Sqrt;x
      </button>
      <button
        id="y-root-from-x"
        class="calc-button special-buttons y-root-from-x"
      >
        <sup>y</sup>
        &Sqrt;x
      </button>
      <button class="calc-button numbers one" data-type="number" data-value="1">
        1
      </button>
      <button class="calc-button numbers two" data-type="number" data-value="2">
        2
      </button>
      <button
        class="calc-button numbers three"
        data-type="number"
        data-value="3"
      >
        3
      </button>
      <button
        class="calc-button orange-buttons add-sign"
        data-type="operator"
        data-value="+"
      >
        +
      </button>
      <button id="color-theme" class="color-theme">&#9788;</button>
      <button class="calc-button orange-buttons ac" data-type="clear">
        AC
      </button>
      <button class="calc-button orange-buttons back">&#8617;</button>
      <button
        class="calc-button numbers double-zero"
        data-type="number"
        data-value="00"
      >
        00
      </button>
      <button
        class="calc-button numbers zero"
        data-type="number"
        data-value="0"
      >
        0
      </button>
      <button class="calc-button numbers dot" data-type="number" data-value=".">
        .
      </button>
      <button class="calc-button orange-buttons equal" data-type="equal">
        =
      </button>
    </div>
    <script type="module" src="index.js"></script>
  </body>
</html>
