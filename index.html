<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="calculator">
      <div class="input-container">
        <input type="text" name="input" id="input" placeholder="0" />
      </div>

      <div id="mc" class="calc-button special-buttons mc">MC</div>
      <div id="mr" class="calc-button special-buttons mr">MR</div>
      <div id="m-plus" class="calc-button special-buttons m-plus">M+</div>
      <div id="m-minus" class="calc-button special-buttons m-minus">M-</div>
      <div id="sign-change" class="calc-button special-buttons sign-change">
        +/-
      </div>
      <div id="percent" class="calc-button special-buttons percent">%</div>
      <div id="division" class="calc-button orange-buttons division">/</div>

      <div id="x-squared" class="calc-button special-buttons x-squared">
        x&sup2;
      </div>
      <div id="x-cubed" class="calc-button special-buttons x-cubed">
        x&sup2;
      </div>
      <div
        id="x-to-the-power-of-y"
        class="calc-button special-buttons x-to-the-power-of-y"
      >
        x
        <sup>y</sup>
      </div>
      <div id="seven" class="calc-button numbers seven">7</div>
      <div id="eight" class="calc-button numbers eight">8</div>
      <div id="nine" class="calc-button numbers nine">9</div>
      <div id="multiply" class="calc-button orange-buttons multiply">*</div>

      <div id="functional" class="calc-button special-buttons functional">
        x!
      </div>
      <div
        id="1-divided-by-x"
        class="calc-button special-buttons one-divided-by-x"
      >
        1/x
      </div>
      <div
        id="ten-powered-by-x"
        class="calc-button special-buttons ten-powered-by-x"
      >
        10
        <sup>x</sup>
      </div>
      <div id="four" class="calc-button numbers four">4</div>
      <div id="five" class="calc-button numbers five">5</div>
      <div id="six" class="calc-button numbers six">6</div>
      <div id="substruct" class="calc-button orange-buttons substruct">-</div>

      <div
        id="square-root-from-x"
        class="calc-button special-buttons square-root-from-x"
      >
        &Sqrt;x
      </div>
      <div
        id="cube-root-from-x"
        class="calc-button special-buttons cube-root-from-x"
      >
        <sup>3</sup>
        &Sqrt;x
      </div>
      <div id="y-root-from-x" class="calc-button special-buttons y-root-from-x">
        <sup>y</sup>
        &Sqrt;x
      </div>
      <div id="one" class="calc-button numbers one">1</div>
      <div id="two" class="calc-button numbers two">2</div>
      <div id="three" class="calc-button numbers three">3</div>
      <div id="add-sign" class="calc-button orange-buttons add-sign">+</div>

      <div id="color-theme" class="color-theme">&#9788;</div>
      <div id="ac" class="calc-button special-buttons ac">AC</div>
      <div id="zero" class="calc-button numbers zero">0</div>
      <div id="dot" class="calc-button numbers dot">,</div>
      <div id="equal" class="calc-button orange-buttons equal">=</div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
